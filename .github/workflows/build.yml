name: Build iOS Script into App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build and Package IPA
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Create App Entry Point
        run: |
          cat > main.swift << 'EOF'
          import SwiftUI

          struct CryptoApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }

          struct ContentView: View {
              @State var resultText: String = "正在运行..."

              var body: some View {
                  Text(resultText)
                      .multilineTextAlignment(.center)
                      .padding()
                      .onAppear {
                          // 在视图出现时执行测试，并把结果更新到界面
                          let output = runCrypto()
                          resultText = output
                      }
              }
          }

          CryptoApp.main()
          EOF

      - name: Compile for iOS
        run: |
          xcrun --sdk iphoneos swiftc \
            -target arm64-apple-ios14.0 \
            -O \
            -o iOSApp \
            main.swift crypto.swift \
            -framework SwiftUI \
            -framework UIKit \
            -framework Foundation

      - name: Assemble .app Bundle
        run: |
          APP_NAME="iOSApp"
          BUNDLE_DIR="${APP_NAME}.app"
          mkdir -p "${BUNDLE_DIR}"
          cp iOSApp "${BUNDLE_DIR}/${APP_NAME}"

          # Info.plist
          cat > "${BUNDLE_DIR}/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
           "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>iOSApp</string>
              <key>CFBundleIdentifier</key>
              <string>com.example.crypto</string>
              <key>CFBundleName</key>
              <string>CryptoScript</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
                  <key>UISceneConfigurations</key>
                  <dict/>
              </dict>
              <key>UILaunchScreen</key>
              <dict/>
              <key>UILaunchStoryboardName</key>
              <string>LaunchScreen</string>
              <key>UISupportedInterfaceOrientations</key>
              <array>
                  <string>UIInterfaceOrientationPortrait</string>
              </array>
          </dict>
          </plist>
          EOF

          # PkgInfo
          echo "APPL????" > "${BUNDLE_DIR}/PkgInfo"

          # LaunchScreen.storyboard
          cat > "${BUNDLE_DIR}/LaunchScreen.storyboard" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <document type="com.apple.InterfaceBuilder3.CocoaTouch.Storyboard.XIB" version="3.0" toolsVersion="21701" targetRuntime="AppleSDK" propertyAccessControl="none" useAutolayout="YES" launchScreen="YES" useTraitCollections="YES" useSafeAreas="YES" colorMatched="YES" initialViewController="01J-lp-oVM">
              <device id="retina6_12" orientation="portrait" appearance="light"/>
              <dependencies>
                  <plugIn identifier="com.apple.InterfaceBuilder.IBCocoaTouchPlugin" version="21678"/>
                  <capability name="Safe area layout guides" minToolsVersion="9.0"/>
                  <capability name="documents saved in the Xcode 8 format" minToolsVersion="8.0"/>
              </dependencies>
              <scenes>
                  <scene sceneID="EHf-IW-A2E">
                      <objects>
                          <viewController id="01J-lp-oVM" sceneMemberID="viewController">
                              <view key="view" contentMode="scaleToFill" id="Ze5-6b-2t3">
                                  <rect key="frame" x="0.0" y="0.0" width="393" height="852"/>
                                  <autoresizingMask key="autoresizingMask" widthSizable="YES" heightSizable="YES"/>
                                  <subviews>
                                      <label opaque="NO" userInteractionEnabled="NO" contentMode="left" horizontalHuggingPriority="251" verticalHuggingPriority="750" text="Crypto Test" textAlignment="center" lineBreakMode="tailTruncation" baselineAdjustment="alignBaselines" adjustsFontSizeToFit="NO" translatesAutoresizingMaskIntoConstraints="NO" id="abc-def">
                                          <rect key="frame" x="50" y="400" width="293" height="50"/>
                                          <fontDescription key="fontDescription" type="system" pointSize="24"/>
                                          <nil key="textColor"/>
                                          <nil key="highlightedColor"/>
                                      </label>
                                  </subviews>
                                  <viewLayoutGuide key="safeArea" id="6Tk-OE-BBY"/>
                                  <color key="backgroundColor" white="1" alpha="1" colorSpace="custom" customColorSpace="genericGamma22GrayColorSpace"/>
                                  <constraints>
                                      <constraint firstItem="abc-def" firstAttribute="centerX" secondItem="Ze5-6b-2t3" secondAttribute="centerX" id="cx1"/>
                                      <constraint firstItem="abc-def" firstAttribute="centerY" secondItem="Ze5-6b-2t3" secondAttribute="centerY" id="cy1"/>
                                  </constraints>
                              </view>
                          </viewController>
                          <placeholder placeholderIdentifier="IBFirstResponder" id="iYj-Kq-Ea1" userLabel="First Responder" sceneMemberID="firstResponder"/>
                      </objects>
                      <point key="canvasLocation" x="53" y="375"/>
                  </scene>
              </scenes>
          </document>
          EOF

      - name: Ad-Hoc Sign the App
        run: codesign --force --sign - iOSApp.app

      - name: Package into IPA
        run: |
          mkdir Payload
          cp -R iOSApp.app Payload/
          zip -r CryptoScript.ipa Payload/
          echo "✅ IPA 生成完成"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CryptoScript-IPA
          path: CryptoScript.ipa
          if-no-files-found: error
