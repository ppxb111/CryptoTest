name: Build iOS Script into App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-ios:
    name: Build and Package IPA
    runs-on: macos-latest

    steps:
      # 1. 拉取仓库代码
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 2. 动态生成 main.swift（不会影响你的本地仓库）
      - name: Create App Entry Point
        run: |
          cat > main.swift << 'EOF'
          import SwiftUI

          // 直接使用你的 crypto.swift 中定义的 runCrypto()
          struct CryptoApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }

          struct ContentView: View {
              var body: some View {
                  Text("Crypto App")
                      .onAppear {
                          runCrypto()      // ✅ 调用你的函数
                      }
              }
          }

          // 手动启动 SwiftUI App（不用 @main，避免与顶层代码冲突）
          CryptoApp.main()
          EOF

      # 3. 编译为 ARM64 iOS 可执行文件
      - name: Compile for iOS
        run: |
          xcrun --sdk iphoneos swiftc \
            -target arm64-apple-ios14.0 \
            -O \
            -o iOSApp \
            main.swift crypto.swift \
            -framework SwiftUI \
            -framework UIKit \
            -framework Foundation

      # 4. 手动创建 .app 包结构
      - name: Assemble .app Bundle
        run: |
          APP_NAME="iOSApp"
          BUNDLE_DIR="${APP_NAME}.app"
          mkdir -p "${BUNDLE_DIR}"
          cp iOSApp "${BUNDLE_DIR}/${APP_NAME}"

          # Info.plist（必需）
          cat > "${BUNDLE_DIR}/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
           "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>iOSApp</string>
              <key>CFBundleIdentifier</key>
              <string>com.example.crypto</string>
              <key>CFBundleName</key>
              <string>CryptoScript</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
                  <key>UISceneConfigurations</key>
                  <dict/>
              </dict>
              <key>UILaunchScreen</key>
              <dict/>
          </dict>
          </plist>
          EOF

          # PkgInfo（可选）
          echo "APPL????" > "${BUNDLE_DIR}/PkgInfo"

      # 5. 使用 Ad‑Hoc 签名（生成可打包的 .app）
      - name: Ad-Hoc Sign the App
        run: codesign --force --sign - iOSApp.app

      # 6. 打包为 .ipa
      - name: Package into IPA
        run: |
          mkdir Payload
          cp -R iOSApp.app Payload/
          zip -r CryptoScript.ipa Payload/
          echo "✅ IPA 生成完成"

      # 7. 上传 IPA 到工作流 artifacts
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: CryptoScript-IPA
          path: CryptoScript.ipa
          if-no-files-found: error
