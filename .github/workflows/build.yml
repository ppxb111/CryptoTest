name: Build iOS App

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest 

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Create Minimal Xcode Project
      run: |
        mkdir CryptoProject
        cd CryptoProject
        xcodebuild -create-xcodeproject \
          -template "com.apple.ios.template.singleViewApp:com.apple.ios.template.singleViewApp" \
          -destination "platform=iOS" \
          -product "CryptoApp" \
          -organization "TestOrg" \
          -language Swift
        cp ../crypto.swift ./CryptoApp/

        ls -la ./CryptoApp/

    - name: Build IPA
      run: |
        cd CryptoProject
        xcodebuild build \
          -project CryptoApp.xcodeproj \
          -scheme CryptoApp \
          -destination "generic/platform=iOS" \
          -configuration Release \
          -derivedDataPath Build \
          CODE_SIGNING_ALLOWED=NO

        mkdir ../output
        mv Build/Build/Products/Release-iphoneos/CryptoApp.app ../output/

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: CryptoApp
        path: output/CryptoApp.app
