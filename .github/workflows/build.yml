name: Build Crypto Test

on:
  push:
    branches: [ "main" ] 
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app


      - name: Build Swift Script
        run: swiftc crypto.swift -o CryptoTest

      - name: Run Test
        run: |
          echo "开始运行测试程序..."
          ./CryptoTest
