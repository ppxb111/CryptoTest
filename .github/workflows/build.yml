name: Build Crypto Test

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允许手动点击运行

jobs:
  build:
    runs-on: macos-latest # 使用 GitHub 提供的最新 Mac 服务器

    steps:
      # 1. 下载你的代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. 选择 Xcode 版本
      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.2.app

      # 3. 编译 Swift 代码 (核心步骤)
      - name: Build Swift Script
        run: |
          # 假设你的 Swift 代码文件叫 main.swift，放在仓库根目录
          # 我们把它编译成一个叫 CryptoTest 的可执行文件
          swiftc -o CryptoTest main.swift

      # 4. 运行测试 (在云端跑一下看看结果)
      - name: Run Test
        run: |
          ./CryptoTest
